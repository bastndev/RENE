<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENE YT Music</title>
</head>
<body>

    <!-- Screen 1: Search -->
    <section id="screen-search" class="screen active">
        <div class="search-container">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="Search for music..."
                autocomplete="off"
                spellcheck="false"
                aria-label="Search music"
            />
            <button id="search-btn" class="search-btn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

        <div class="quick-access">
            <button class="qa-btn is-active" type="button" aria-current="true" style="display: inline-flex; align-items: center; gap: 6px;">
                Music
                <span id="qa-play-btn" style="display: none; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; opacity: 0.9; cursor: pointer;" title="Play/Pause">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path id="qa-play-path" d="M8 5v14l11-7z"/>
                    </svg>
                </span>
            </button>
            <button class="qa-btn" type="button" data-screen="time">Time</button>
            <button class="qa-btn" type="button" data-screen="game">Game</button>
        </div>
    </section>

    <div id="atm-music-root"></div>

    <section id="screen-time" class="screen">
        <div id="atm-time-root" class="center-screen-message"></div>
    </section>

    <section id="screen-game" class="screen">
        <div id="atm-game-root" class="center-screen-message"></div>
    </section>

    <!-- Hidden Player -->
    <div id="youtube-player" style="display: none; position: absolute; pointer-events: none;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
